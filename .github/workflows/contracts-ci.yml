name: Contracts CI

on:
  push:
    branches: ["main"]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"

defaults:
  run:
    working-directory: contracts

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aiken-lang/setup-aiken@v1
        with:
          version: v1.1.22
      - run: aiken fmt --check
      - run: aiken check -D
      - run: aiken build
