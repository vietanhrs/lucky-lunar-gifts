name: Web CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "contracts/**"
      - "server/**"
  pull_request:
    paths-ignore:
      - "contracts/**"
      - "server/**"

jobs:
  unit:
    name: Typecheck, unit tests & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx tsc -p tsconfig.app.json --noEmit
      - run: bun run test
      - run: bun run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - run: bun run e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
